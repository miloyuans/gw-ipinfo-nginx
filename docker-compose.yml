services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: gw-ipinfo-nginx:local
    command: ["/app/gw-ipinfo-nginx", "-config", "/app/configs/config.yaml"]
    env_file:
      - .env
    ports:
      - "127.0.0.1:${GW_HTTP_PORT:-8080}:8080"
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - shared_data:/data/shared
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O - http://127.0.0.1:8080/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - edge
      - backend

  mongo:
    image: mongo:7
    command: ["--bind_ip_all", "--auth"]
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
      - ./deployments/mongo/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O - http://127.0.0.1:8081/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - backend

volumes:
  mongo_data:
  shared_data:

networks:
  edge:
  backend:
    internal: true
