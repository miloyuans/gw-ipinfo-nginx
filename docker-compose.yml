version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: gw-ipinfo-nginx:dev
    command: ["/app/gw-ipinfo-nginx", "-config", "/app/configs/config.docker.yaml"]
    ports:
      - "8080:8080"
    environment:
      IPINFO_TOKEN: "${IPINFO_TOKEN:-}"
      MONGO_URI: "mongodb://mongo:27017"
    depends_on:
      mongo:
        condition: service_healthy
      nginx:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/index.html:/usr/share/nginx/html/index.html:ro
