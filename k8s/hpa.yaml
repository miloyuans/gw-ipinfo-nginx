apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: global-googleplay-luodiye
  namespace: area
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: global-googleplay-luodiye
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
