apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: gw-mongodb
  namespace: mongodb
spec:
  members: 3                                      # 3副本高可用
  type: ReplicaSet
  version: "8.0.0"

  # 存储 - 使用你指定的 StorageClass
  persistent: true
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: mongodb-efs-us
            resources:
              requests:
                storage: 30Gi                     # 建议 30Gi 起步，缓存数据会增长

  # 认证（生产必须开启）
  security:
    authentication:
      modes: ["SCRAM"]

  users:
    - name: gwadmin
      db: admin
      passwordSecretRef:
        name: gw-mongodb-admin-password
      roles:
        - name: readWriteAnyDatabase
          db: admin
        - name: clusterMonitor
          db: admin

  # 资源配置（根据项目推荐调整）
  podSpec:
    podTemplate:
      spec:
        containers:
          - name: mongodb
            resources:
              requests:
                cpu: "1"
                memory: "3Gi"
              limits:
                cpu: "3"
                memory: "6Gi"

  # 推荐生产配置：跨节点分散
  # topologySpreadConstraints 或 podAntiAffinity 可在此处通过 patch 添加