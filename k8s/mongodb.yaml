apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: gw-mongodb
  namespace: mongodb
spec:
  members: 3
  type: ReplicaSet
  version: "8.0.0"

  # ==================== 存储配置（正确写法） ====================
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: mongodb-efs-us        # ← 必须在这里明确指定
            resources:
              requests:
                storage: 30Gi

        - metadata:
            name: logs                              # Operator 默认会创建 logs volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: mongodb-efs-us        # ← 同样必须指定
            resources:
              requests:
                storage: 5Gi                        # logs 通常不需要太大

  # ==================== 认证 ====================
  security:
    authentication:
      modes: ["SCRAM"]

  users:
    - name: gwadmin
      db: admin
      passwordSecretRef:
        name: gw-mongodb-admin-password
      roles:
        - name: readWriteAnyDatabase
          db: admin
        - name: clusterMonitor
          db: admin
      scramCredentialsSecretName: gw-mongodb-gwadmin-scram

  # ==================== 资源配置 ====================
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: "2"
                  memory: "2Gi"