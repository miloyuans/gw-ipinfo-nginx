apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: gw-mongodb
  namespace: mongodb
spec:
  members: 3
  type: ReplicaSet
  version: "8.0.0"

  # ==================== 存储配置（必须使用这个方式） ====================
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: mongodb-efs-us
            resources:
              requests:
                storage: 30Gi

  # ==================== 认证（生产推荐） ====================
  security:
    authentication:
      modes: ["SCRAM"]

  users:
    - name: gwadmin
      db: admin
      passwordSecretRef:
        name: gw-mongodb-admin-password
      roles:
        - name: readWriteAnyDatabase
          db: admin
        - name: clusterMonitor
          db: admin
      scramCredentialsSecretName: gw-mongodb-gwadmin-scram

  # ==================== 资源限制（推荐根据节点调整） ====================
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: "2"
                  memory: "2Gi"