apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-googleplay-luodiye-01
  namespace: area
  labels:
    app: global-googleplay-luodiye-01
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: global-googleplay-luodiye-01
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: global-googleplay-luodiye-01
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: global-googleplay-luodiye-01
      containers:
        - name: gw-ipinfo-nginx-gateway
          image: 582998837184.dkr.ecr.us-west-1.amazonaws.com/international/gw-ipinfo-nginx:v1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - "-config"
            - "/etc/gw-ipinfo-nginx/config.yaml"
          envFrom:
            - secretRef:
                name: gw-ipinfo-nginx-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 8080
              name: gw-http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: gw-config
              mountPath: /etc/gw-ipinfo-nginx/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: webroot
              mountPath: /data/shared
              subPath: gw-ipinfo
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: webroot
              mountPath: /usr/share/nginx/html/googleplay
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      volumes:
        - name: gw-config
          configMap:
            name: gw-ipinfo-nginx-config
        - name: nginx-conf
          configMap:
            defaultMode: 420
            name: global-luodiye-nginx-conf
        - name: webroot
          persistentVolumeClaim:
            claimName: global-googleplay-luodiye-01-pvc
