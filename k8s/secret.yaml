apiVersion: v1
kind: Secret
metadata:
  name: gw-ipinfo-nginx-secret
  namespace: area
type: Opaque
stringData:
  IPINFO_TOKEN: "replace-me"
  TELEGRAM_BOT_TOKEN: "replace-me"
  TELEGRAM_CHAT_ID: "replace-me"
  # 单机普通 mongod 推荐 directConnection=true&retryWrites=false。
  # 只有在“单节点副本集 + rs.status() 为 PRIMARY + 成员地址对 Pod 可达”时，
  # 才建议改成 replicaSet=mongodb-rs&retryWrites=true&w=majority。
  MONGO_URI: "mongodb://gwadmin:replace-me@10.19.0.1:27017/gw_ipinfo_nginx?authSource=gw_ipinfo_nginx&directConnection=true&retryWrites=false"
