# gw-ipinfo-nginx 主线生产配置参考
#
# 这份配置按“Mongo 优先、Mongo 故障自动降级到本地磁盘、所有异步任务不阻塞主链路”的思路整理。
# 推荐直接复制成 configs/config.yaml 再按你的环境改。

server:
  listen_address: ":8080"
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s
  deny_status_code: 403
  prefork:
    # Linux 可选 prefork 多进程监听模式。
    # 关闭时使用单进程 + goroutine 并发；开启后会按下面的 processes 派生多个工作进程。
    enabled: false
    processes: 1

real_ip:
  # 当前主线默认接收所有入口流量，不先校验 CDN 来源。
  # 但真实客户端 IP 仍然只接受合法公网 IP。
  trust_all_sources: true
  header_priority:
    - "CF-Connecting-IP"
    - "CF-Connecting-IPv6"
    - "True-Client-IP"
    - "X-Real-IP"
    - "X-Forwarded-For"
  # 如果未来恢复可信代理校验，建议保持 deny。
  untrusted_proxy_action: "deny"
  trusted_proxy_cidrs: []

ipinfo:
  enabled: false
  base_url: "https://api.ipinfo.io"
  lookup_path_template: "/lookup/%s"
  token: "${IPINFO_TOKEN}"
  timeout: 2s
  max_retries: 2
  retry_backoff: 250ms
  include_residential_proxy: true

mongo:
  # 如果是单机普通 mongod，建议：
  # mongodb://user:pass@host:27017/gw_ipinfo_nginx?authSource=admin&directConnection=true&retryWrites=false
  # 注意：authSource 要写“用户实际创建在哪个库”。
  # 如果你用的是管理员账号，例如 gwadmin，通常更可能是 admin。
  #
  # 如果是单节点副本集，并且 rs.status() 明确是 PRIMARY，且副本集成员地址对网关 Pod 可达，
  # 可以继续使用：
  # mongodb://user:pass@host:27017/gw_ipinfo_nginx?authSource=admin&replicaSet=mongodb-rs&retryWrites=true&w=majority
  #
  # 生产推荐还是 3 节点副本集。即使 Mongo 暂时不可用，网关也会自动降级到本地磁盘继续服务。
  uri: "${MONGO_URI}"
  database: "${MONGO_APP_DATABASE}"
  connect_timeout: 5s
  # connect_timeout 只管建连；operation_timeout 是仓库层单次操作上下文超时；
  # timeout 是 Mongo Driver 级整体操作超时。
  operation_timeout: 5s
  timeout: 10s
  # maxOpenConns 会映射为 Mongo Driver 的 maxPoolSize，适合习惯 database/sql 命名的人。
  maxOpenConns: 200
  # maxIdleConns 不是 Mongo Driver 原生参数，这里兼容映射到“保温连接池”思路，
  # 会近似折算为 minPoolSize。
  maxIdleConns: 50
  # 以下是 Mongo Driver 原生池参数，更适合高并发网关。
  minPoolSize: 20
  maxConnecting: 16
  # connMaxLifetime 也不是 Mongo Driver 原生参数，这里兼容映射为 maxConnIdleTime。
  connMaxLifetime: 5m
  maxConnIdleTime: 5m

cache:
  l1:
    enabled: true
    # IPinfo 本地热点缓存上限
    max_entries: 100000
    # 短路决策缓存上限
    short_circuit_entries: 200000
    # Shard 越大并发越高，但内存也会略增；64 适合 10k QPS 档。
    shards: 64
    cleanup_interval_sec: 300
  ttl:
    geo: 24h
    privacy: 6h
    residential_proxy: 6h
  # IPinfo 查询失败的负缓存 TTL
  failure_ttl: 5m
  # 决策短路缓存 TTL，超过该时间未更新会过期
  short_circuit_ttl: 10h
  # Mongo 降级时，本地缓存保底生命周期
  local_fallback_ttl: 24h
  mongo_collections:
    ip_cache: "ip_risk_cache"
    decision_cache: "decision_short_circuit_cache"
    alert_outbox: "alerts_outbox"
    alert_dedupe: "alerts_dedupe"
    report_events: "request_reports_daily"

security:
  ua:
    enabled: true
    deny_keywords:
      - "bot"
      - "crawler"
      - "spider"
      - "facebookexternalhit"
      - "facebot"
    deny_patterns: []

  accept_language:
    require_header: false
    service_overrides:
      default:
        allow_missing: true

  geo:
    default_action: "deny"
    whitelist:
      US: {}
      JP:
        cities:
          - "Tokyo"
          - "Osaka"

  privacy:
    deny_by_default: true
    # 可选值：
    # vpn / proxy / tor / relay / hosting / residential_proxy
    allow_types: []
    enable_residential_proxy: true

routing:
  default_service: "default"
  services:
    - name: "default"
      match_path_prefixes:
        - "/"
      # 可以填同 Pod sidecar，也可以填集群内或外部 nginx 地址
      target_url: "${NGINX_TARGET_URL}"
      preserve_host: true

route_sets:
  bypass:
    enabled: false
    config_path: "bypassroute.yaml"
  default:
    enabled: false
    config_path: "defaultroute.yaml"
  v1:
    enabled: false
    config_path: "passroute_v1.yaml"
  v2:
    enabled: false
    config_path: "passroute_v2.yaml"
  v3:
    enabled: false
    config_path: "passroute_v3.yaml"
  v4:
    # 仅作为 v4 独立 host 路由文件入口，不参与 bypass/default/v1/v2/v3 编译器。
    enabled: false
    config_path: "passroute_v4.yaml"
  strict_host_control: false
  fail_fast_on_conflict: true
  redirect_status_code: 302
  v1_grant:
    ttl: 1h
    bind_user_agent: true
    bind_client_ip: true
    bind_client_ip_v4_prefix: 24
    bind_client_ip_v6_prefix: 56
    query_param: "gwgr"
    cookie_name: "__Host-gwgr"
    signing_key: "${GW_V1_GRANT_SIGNING_KEY}"

v3_defaults:
  health_check:
    interval: 30s
    timeout: 3s
    healthy_threshold: 2
    unhealthy_threshold: 2

v4:
  enabled: false
  sync:
    # 后台定时解析 nginx conf，生成 auto hosts 并写入 last-good snapshot。
    # 解析失败时只记事件和日志，不会覆盖历史可用快照。
    enabled: true
    interval: 1m
    # v4 snapshot 同步 leader 租约名；多副本下只允许一个 leader 周期写 Mongo。
    lease_name: "v4-snapshot-sync"
    # leader 租约 TTL。
    lease_ttl: 45s
    # leader 续租间隔，必须小于 lease_ttl。
    renew_interval: 15s
  ingress:
    # 只在后台定时解析这些 nginx conf。
    # Telegram 的 /routes 命令只查数据库 / 本地持久化快照，不会现场解析 conf。
    # 支持文件、目录、glob 多路径混合输入；目录会递归扫描 *.conf。
    config_paths:
      - "/etc/nginx/nginx.conf"
  passthrough:
    # v4 命中后的默认透传后端 service，必须能在 routing.services 里找到。
    service: "default"
  security:
    # false：默认关闭安全检查。
    # 会跳过请求级风控、Geo/Privacy deny，仅保留 best-effort client IP、日志、统计、反代。
    security_checks_enabled: false
  ip_enrichment:
    # disabled | cache_only | full
    # disabled：默认关闭 enrichment，并优先只吃缓存；
    # cache_only：只查缓存，不打远端；
    # full：允许走完整 IP enrichment 链路。
    mode: "disabled"
  probe_defaults:
    # v4 探测默认间隔，默认每 3 秒执行一次。
    interval: 3s
    timeout: 3s
    healthy_threshold: 2
    # 连续 3 次异常后才切换到降级路由。
    unhealthy_threshold: 3
    min_switch_interval: 2m
    user_agent: "gw-ipinfo-nginx-v4-probe/1.0"
    # 命中这些 HTTP 状态码时视为探测异常，默认把 404 判定为异常。
    unhealthy_status_codes:
      - 404
    # v4 探测临时工作区，会记录每个 host 最近发现到的跳转 URL 和失败详情。
    workspace_dir: "/data/shared/v4-probe-workspace"
  telegram:
    enabled: false
    # 新增 Telegram 查询命令，默认 /routes。
    # 只查已落库的快照 / runtime state / recent events。
    command: "/routes"
    send_html_file: true
    # /routes 正文摘要里最多展示多少个 top hosts。
    # 默认 3 个，避免正文过长；HTML 附件仍保留全量明细。
    max_hosts: 3
    # 同一 fingerprint 在这个窗口内做去重，避免重复通知。
    dedupe_window: 15m
    # 静默窗口；在静默期内同 fingerprint 事件不重复发通知。
    silent_window: 1h
  # 兼容期保留：老版本 v4.overrides 会继续读取，但已废弃。
  # 新增 host 级配置请迁移到 route_sets.v4.config_path 指向的 passroute_v4.yaml。
  overrides: []

alerts:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    api_base_url: "https://api.telegram.org"
    timeout: 5s
    parse_mode: ""
    # 机器人显示名，用于生命周期通知和日报标题
    display_name: "gw-ipinfo-nginx"
    # Telegram 通知标题前缀；为空时会自动回落到 display_name
    title_prefix: "[gw-ipinfo-nginx]"
    mask_query: true
    include_user_agent: true
    lifecycle:
      startup_notify: true
      shutdown_notify: true
      unclean_exit_notify: true
      self_check_on_start: true
      heartbeat_enabled: false
      heartbeat_interval: 30m
      notify_mode: "notify"
    command_bot:
      # Telegram 群交互机器人开关。
      # 开启后支持在指定群里发送 /q 114.114.114.114 8.8.8.8 这种命令来查 IPinfo /lookup。
      # 默认会复用主程序的 IPinfo 缓存命中链和查询去重逻辑；
      # 只有当这里配置了与全局不同的 ipinfo_token 时，才会使用独立查询客户端。
      # 查询次数采用轻量内存计数：按“同一个被查询 IP 在当前服务运行期间”的次数递增展示。
      # 不追求跨服务重启的永久精确计数，服务重启后会重新从首次查询开始。
      enabled: false
      # 下面这些独立配置留空时，会自动回落到 alerts.telegram 的默认机器人配置。
      bot_token: ""
      chat_id: ""
      # 允许交互的用户 ID 白名单；留空表示所有用户都可以使用。
      # 一旦配置后，只有这些用户 ID 可以在指定群内触发交互命令。
      allowed_user_ids: []
      api_base_url: ""
      # 单次查询命令的整体超时。
      timeout: 60s
      # Telegram getUpdates 长轮询超时。
      poll_timeout: 25s
      # 拉取更新失败后的退避间隔。
      error_backoff: 2s
      # 多进程 / 多副本共享租约名。相同机器人建议固定不变。
      lease_name: "telegram-command-bot"
      # 租约 TTL。只有持有租约的实例会真正执行轮询。
      lease_ttl: 45s
      # 租约续期间隔，必须小于 lease_ttl。
      renew_interval: 15s
      # 触发命令，支持改成 /ipq 或其它自定义指令。
      command: "/q"
      # 该交互功能默认使用 HTML 回复，便于粗体和 pre 格式化输出。
      parse_mode: "HTML"
      # 独立 IPinfo token；留空时回落到全局 ipinfo.token。
      ipinfo_token: ""
      # 是否忽略私聊消息。默认 true，只允许指定群使用。
      disable_private_chat: true
      # 非授权群是否回复提示。
      reply_unauthorized_chat: true
      # 一次命令允许查询的 IP 数量上限。
      max_ips_per_request: 10
      # 单条命令内部并发查询 IPinfo 的数量。
      max_concurrent_lookups: 5
      # Telegram 单条消息分片大小，超出会自动切块发送。
      message_chunk_size: 3500
      templates:
        unauthorized_chat: "此机器人仅允许在指定群内使用。"
        unauthorized_user: "你没有权限使用此机器人命令。"
        usage: "用法：%s <IP1> <IP2> ...\n例如：%s 114.114.114.114 8.8.8.8\n支持 IPv6：%s 2001:4860:4860::8888"
        too_many_ips: "本次最多查询 %d 个 IP，已自动截断超出部分。"
        empty_result: "没有可展示的查询结果。"
  delivery:
    worker_enabled: false
    poll_interval: 2s
    batch_size: 50
    claim_lease: 30s
    max_attempts: 8
    base_backoff: 5s
    max_backoff: 5m
    rate_limit_per_second: 5
  dedupe:
    window: 10m

reports:
  # 开启后会每天定时通过 Telegram 发送 HTML + CSV 两个附件
  enabled: false
  # 日报标题，会用于 HTML 标题和 Telegram 附件标题
  title: "gw-ipinfo-nginx 日报"
  timezone_mode: "config"
  timezone: "UTC"
  daily_send_time: "09:00"
  period_mode: "lookback"
  lookback: 24h
  # 多 Pod / 多进程场景下的日报调度共享租约名。
  # 所有副本保持一致后，全局只会有一个 leader 负责真正发送日报，其他副本只等待和续租判断。
  leader_lease_name: "daily-report-scheduler"
  # leader 租约 TTL。
  leader_lease_ttl: 45s
  # leader 续租间隔，必须小于 leader_lease_ttl。
  leader_renew_interval: 15s
  # 日报发送失败后，每隔多久重试一次
  retry_interval: 15m
  # 最多向前补发多少天的日报
  max_backfill_days: 7
  top_n: 10
  include_csv: true
  include_html: true
  worker_enabled: true
  poll_interval: 1m
  replay_batch_size: 1000
  output:
    telegram_enabled: false
    file_enabled: false
    output_dir: "/data/shared/reports"
  filename:
    prefix: "gw-report"
    append_date: true
    date_format: "2006-01-02"

branding:
  display_name: "gw-ipinfo-nginx"

storage:
  # 本地降级数据库路径；Docker / K8s 都建议挂载到持久目录。
  # 当前主线会在运行时自动按 Pod / prefork worker 维度做本地分片，
  # 配置里保持统一路径即可，不需要手工按 Pod 区分。
  # 每个 worker 只写自己的分片文件，但会跨 worker 只读扫描共享目录中的其它分片。
  local_path: "/data/shared/gw-ipinfo-nginx.db"
  replay_interval: 30s
  mongo_probe_interval: 10s
  replay_batch_size: 500
  replay_workers: 2

performance:
  # 主链路异步队列和连接池
  request_queue_size: 4096
  async_write_queue_size: 16384
  stats_queue_size: 32768
  decision_workers: 4
  alert_workers: 2
  # 1 = 不采样；可以按需要改成 10 / 100 降低日志量
  log_sample_rate: 1
  proxy_max_idle_conns: 2048
  proxy_max_idle_conns_per_host: 1024
  proxy_idle_conn_timeout: 90s
  proxy_response_header_timeout: 5s
  proxy_expect_continue_timeout: 1s

deny_page:
  target_url: "https://vpbet.com"
  preserve_host: false
  title: "Access Unavailable"
  heading: "Request Blocked"
  message: "Your request did not pass the gateway security checks."
  hint: "If you believe this is a mistake, contact support and provide the request ID."

logging:
  level: "info"
  # 生产建议 json，方便日志平台检索
  format: "json"
  redact_query: true
  access_log: true

metrics:
  enabled: true
  path: "/metrics"
