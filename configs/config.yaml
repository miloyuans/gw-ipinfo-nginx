server:
  listen_address: ":8080"
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s
  deny_status_code: 403
  prefork:
    enabled: false
    processes: 1

real_ip:
  trust_all_sources: true
  header_priority:
    - "CF-Connecting-IP"
    - "CF-Connecting-IPv6"
    - "True-Client-IP"
    - "X-Real-IP"
    - "X-Forwarded-For"
  untrusted_proxy_action: "deny"
  trusted_proxy_cidrs: []

ipinfo:
  enabled: false
  base_url: "https://api.ipinfo.io"
  lookup_path_template: "/lookup/%s"
  token: "${IPINFO_TOKEN}"
  timeout: 2s
  max_retries: 2
  retry_backoff: 250ms
  include_residential_proxy: true

mongo:
  uri: "${MONGO_URI}"
  database: "${MONGO_APP_DATABASE}"
  connect_timeout: 5s
  operation_timeout: 5s
  timeout: 10s
  # maxOpenConns 会自动映射到 Mongo Driver 的 maxPoolSize。
  # 如果你更习惯 Mongo 原生命名，也可以直接写 maxPoolSize。
  maxOpenConns: 200
  # 兼容 database/sql 风格配置；会近似映射到 minPoolSize，表示保留一定热连接。
  maxIdleConns: 50
  minPoolSize: 20
  maxConnecting: 16
  # Mongo Driver 没有 database/sql 风格的 maxIdleConns / connMaxLifetime。
  # connMaxLifetime 会兼容映射到更接近的 maxConnIdleTime。
  connMaxLifetime: 5m
  maxConnIdleTime: 5m

cache:
  l1:
    enabled: true
    max_entries: 100000
    short_circuit_entries: 200000
    shards: 64
    cleanup_interval_sec: 300
  ttl:
    geo: 24h
    privacy: 6h
    residential_proxy: 6h
  failure_ttl: 5m
  short_circuit_ttl: 10h
  local_fallback_ttl: 24h
  mongo_collections:
    ip_cache: "ip_risk_cache"
    decision_cache: "decision_short_circuit_cache"
    alert_outbox: "alerts_outbox"
    alert_dedupe: "alerts_dedupe"
    report_events: "request_reports_daily"

security:
  ua:
    enabled: true
    deny_keywords:
      - "bot"
      - "crawler"
      - "spider"
      - "facebookexternalhit"
      - "facebot"
    deny_patterns: []
  accept_language:
    require_header: false
    service_overrides:
      default:
        allow_missing: true
  geo:
    default_action: "deny"
    whitelist:
      US: {}
      JP:
        cities:
          - "Tokyo"
          - "Osaka"
  privacy:
    deny_by_default: true
    allow_types: []
    enable_residential_proxy: true

routing:
  default_service: "default"
  services:
    - name: "default"
      match_path_prefixes:
        - "/"
      target_url: "${NGINX_TARGET_URL}"
      preserve_host: true

route_sets:
  bypass:
    enabled: false
    config_path: "bypassroute.yaml"
  default:
    enabled: false
    config_path: "defaultroute.yaml"
  v1:
    enabled: false
    config_path: "passroute_v1.yaml"
  v2:
    enabled: false
    config_path: "passroute_v2.yaml"
  v3:
    enabled: false
    config_path: "passroute_v3.yaml"
  v4:
    # 仅作为 v4 独立 host 路由文件入口，不参与 bypass/default/v1/v2/v3 编译器。
    enabled: false
    config_path: "passroute_v4.yaml"
  strict_host_control: false
  fail_fast_on_conflict: true
  redirect_status_code: 302
  v1_grant:
    ttl: 1h
    bind_user_agent: true
    bind_client_ip: true
    bind_client_ip_v4_prefix: 24
    bind_client_ip_v6_prefix: 56
    query_param: "gwgr"
    cookie_name: "__Host-gwgr"
    signing_key: "${GW_V1_GRANT_SIGNING_KEY}"

v3_defaults:
  health_check:
    interval: 30s
    timeout: 3s
    healthy_threshold: 2
    unhealthy_threshold: 2

v4:
  enabled: false
  sync:
    # 后台定时解析 nginx conf，生成并落库 last-good snapshot。
    # conf 解析失败时不会覆盖历史快照。
    enabled: true
    interval: 1m
    # 仅一个 leader 负责构建和写入 v4 snapshot。
    lease_name: "v4-snapshot-sync"
    lease_ttl: 45s
    renew_interval: 15s
  ingress:
    # 这里只做后台解析；Telegram /routes 只查数据库 / 本地快照，不现场解析 conf。
    # 支持文件、目录、glob 多路径混合输入；目录会递归扫描 *.conf。
    config_paths:
      - "/etc/nginx/nginx.conf"
  passthrough:
    # v4 命中后默认透传到这个已存在的 routing.service。
    service: "default"
  security:
    # 默认关闭安全检查。
    # 为 false 时跳过请求级风控、Geo/Privacy deny，只做日志、统计、尽力提取 client IP、反代。
    security_checks_enabled: false
  ip_enrichment:
    # disabled | cache_only | full
    # 默认 disabled；关闭时优先只吃缓存，不主动打远端 IPinfo。
    mode: "disabled"
  probe_defaults:
    interval: 30s
    timeout: 3s
    healthy_threshold: 2
    unhealthy_threshold: 2
    min_switch_interval: 2m
    user_agent: "gw-ipinfo-nginx-v4-probe/1.0"
  telegram:
    enabled: false
    # /routes 只查已落库的 v4 snapshot / runtime state / recent events。
    command: "/routes"
    send_html_file: true
    # /routes 正文摘要里最多展示多少个 top hosts。
    # 默认只展示 3 个，避免正文过长；HTML 附件仍会保留全量明细。
    max_hosts: 3
    dedupe_window: 15m
    silent_window: 1h
  # 兼容期保留：老版本 v4.overrides 会继续读取，但已废弃。
  # 新增 host 级配置请迁移到 route_sets.v4.config_path 指向的 passroute_v4.yaml。
  overrides: []

alerts:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    api_base_url: "https://api.telegram.org"
    timeout: 5s
    parse_mode: ""
    # 机器人显示名，用于生命周期通知和日报标题。
    display_name: "gw-ipinfo-nginx"
    # Telegram 通知标题前缀；为空时自动回落到 display_name。
    title_prefix: "[gw-ipinfo-nginx]"
    mask_query: true
    include_user_agent: true
    lifecycle:
      startup_notify: true
      shutdown_notify: true
      unclean_exit_notify: true
      self_check_on_start: true
      heartbeat_enabled: false
      heartbeat_interval: 30m
      notify_mode: "notify"
    command_bot:
      # 启用后，机器人会在指定群内轮询命令并查询 IPinfo /lookup
      # 默认会复用主程序的 IPinfo 缓存命中链和查询去重逻辑；
      # 只有当这里配置了与全局不同的 ipinfo_token 时，才会使用独立查询客户端。
      # 查询次数采用轻量实现：按“同一个被查询 IP 在当前服务运行期间”的次数递增展示。
      # 该计数不会做跨重启持久化，服务重启后会从首次查询重新开始。
      enabled: false
      # 独立机器人配置；留空时自动回落到上面的 telegram 默认配置
      bot_token: ""
      chat_id: ""
      # 允许交互的 Telegram 用户 ID 白名单。
      # 留空表示允许所有用户；一旦配置则只有白名单用户能触发命令。
      allowed_user_ids: []
      api_base_url: ""
      # 单次命令处理超时
      timeout: 60s
      # Telegram 长轮询超时
      poll_timeout: 25s
      # 拉取 updates 失败后的退避时间
      error_backoff: 2s
      # 多进程 / 多副本场景下的共享租约名；同一个 bot token 建议保持唯一
      lease_name: "telegram-command-bot"
      # 命令机器人租约 TTL；只有持有租约的实例会真正轮询 Telegram
      lease_ttl: 45s
      # 租约续期间隔，必须小于 lease_ttl
      renew_interval: 15s
      # 触发指令，支持 /q 或自定义成 /ipq 之类
      command: "/q"
      parse_mode: "HTML"
      # 机器人查询所使用的 IPinfo token；留空时回落到全局 ipinfo.token
      ipinfo_token: ""
      # 默认不处理私聊，只允许指定群内使用
      disable_private_chat: true
      # 收到非授权群请求时，是否回复提示
      reply_unauthorized_chat: true
      # 单条命令最多查询多少个 IP
      max_ips_per_request: 10
      # 单条命令内并发查询 IPinfo 的数量
      max_concurrent_lookups: 5
      # 单条 Telegram 消息最大切片长度，超出会自动分段
      message_chunk_size: 3500
      templates:
        unauthorized_chat: "此机器人仅允许在指定群内使用。"
        unauthorized_user: "你没有权限使用此机器人命令。"
        usage: "用法：%s <IP1> <IP2> ...\n例如：%s 114.114.114.114 8.8.8.8\n支持 IPv6：%s 2001:4860:4860::8888"
        too_many_ips: "本次最多查询 %d 个 IP，已自动截断超出部分。"
        empty_result: "没有可展示的查询结果。"
  delivery:
    worker_enabled: false
    poll_interval: 2s
    batch_size: 50
    claim_lease: 30s
    max_attempts: 8
    base_backoff: 5s
    max_backoff: 5m
    rate_limit_per_second: 5
  dedupe:
    window: 10m

reports:
  enabled: false
  # 日报标题，会用于 HTML 标题和 Telegram 附件说明。
  title: "gw-ipinfo-nginx 日报"
  timezone_mode: "config"
  timezone: "UTC"
  daily_send_time: "09:00"
  period_mode: "lookback"
  lookback: 24h
  # 日报发送失败后的重试间隔。
  retry_interval: 15m
  # 最多向前回补多少天的日报状态。
  max_backfill_days: 7
  top_n: 10
  include_csv: true
  include_html: true
  worker_enabled: true
  poll_interval: 1m
  replay_batch_size: 1000
  output:
    telegram_enabled: false
    file_enabled: false
    output_dir: "/data/shared/reports"
  filename:
    prefix: "gw-report"
    append_date: true
    date_format: "2006-01-02"

branding:
  display_name: "gw-ipinfo-nginx"

storage:
  local_path: "/data/shared/gw-ipinfo-nginx.db"
  replay_interval: 30s
  mongo_probe_interval: 10s
  replay_batch_size: 500
  replay_workers: 2

performance:
  request_queue_size: 4096
  async_write_queue_size: 16384
  stats_queue_size: 32768
  decision_workers: 4
  alert_workers: 2
  log_sample_rate: 1
  proxy_max_idle_conns: 2048
  proxy_max_idle_conns_per_host: 1024
  proxy_idle_conn_timeout: 90s
  proxy_response_header_timeout: 5s
  proxy_expect_continue_timeout: 1s

deny_page:
  target_url: ""
  preserve_host: false
  title: "Access Unavailable"
  heading: "Request Blocked"
  message: "Your request did not pass the gateway security checks."
  hint: "If you believe this is a mistake, contact support and provide the request ID."

logging:
  level: "info"
  format: "json"
  redact_query: true
  access_log: true

metrics:
  enabled: true
  path: "/metrics"
