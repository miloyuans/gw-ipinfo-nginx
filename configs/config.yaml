server:
  listen_address: ":8080"
  read_timeout: 10s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 15s
  deny_status_code: 403
  prefork:
    enabled: false
    processes: 1

real_ip:
  trust_all_sources: true
  header_priority:
    - "CF-Connecting-IP"
    - "CF-Connecting-IPv6"
    - "True-Client-IP"
    - "X-Real-IP"
    - "X-Forwarded-For"
  untrusted_proxy_action: "deny"
  trusted_proxy_cidrs: []

ipinfo:
  enabled: false
  base_url: "https://api.ipinfo.io"
  lookup_path_template: "/lookup/%s"
  token: "${IPINFO_TOKEN}"
  timeout: 2s
  max_retries: 2
  retry_backoff: 250ms
  include_residential_proxy: true

mongo:
  uri: "${MONGO_URI}"
  database: "${MONGO_APP_DATABASE}"
  connect_timeout: 5s
  operation_timeout: 5s
  timeout: 10s
  # maxOpenConns 会自动映射到 Mongo Driver 的 maxPoolSize。
  # 如果你更习惯 Mongo 原生命名，也可以直接写 maxPoolSize。
  maxOpenConns: 200
  # 兼容 database/sql 风格配置；会近似映射到 minPoolSize，表示保留一定热连接。
  maxIdleConns: 50
  minPoolSize: 20
  maxConnecting: 16
  # Mongo Driver 没有 database/sql 风格的 maxIdleConns / connMaxLifetime。
  # connMaxLifetime 会兼容映射到更接近的 maxConnIdleTime。
  connMaxLifetime: 5m
  maxConnIdleTime: 5m

cache:
  l1:
    enabled: true
    max_entries: 100000
    short_circuit_entries: 200000
    shards: 64
    cleanup_interval_sec: 300
  ttl:
    geo: 24h
    privacy: 6h
    residential_proxy: 6h
  failure_ttl: 5m
  short_circuit_ttl: 10h
  local_fallback_ttl: 24h
  mongo_collections:
    ip_cache: "ip_risk_cache"
    decision_cache: "decision_short_circuit_cache"
    alert_outbox: "alerts_outbox"
    alert_dedupe: "alerts_dedupe"
    report_events: "request_reports_daily"

security:
  ua:
    enabled: true
    deny_keywords:
      - "bot"
      - "crawler"
      - "spider"
      - "facebookexternalhit"
      - "facebot"
    deny_patterns: []
  accept_language:
    require_header: false
    service_overrides:
      default:
        allow_missing: true
  geo:
    default_action: "deny"
    whitelist:
      US: {}
      JP:
        cities:
          - "Tokyo"
          - "Osaka"
  privacy:
    deny_by_default: true
    allow_types: []
    enable_residential_proxy: true

routing:
  default_service: "default"
  services:
    - name: "default"
      match_path_prefixes:
        - "/"
      target_url: "${NGINX_TARGET_URL}"
      preserve_host: true

route_sets:
  bypass:
    enabled: false
    config_path: "bypassroute.yaml"
  default:
    enabled: false
    config_path: "defaultroute.yaml"
  v1:
    enabled: false
    config_path: "passroute_v1.yaml"
  v2:
    enabled: false
    config_path: "passroute_v2.yaml"
  strict_host_control: false
  fail_fast_on_conflict: true
  redirect_status_code: 302
  v1_grant:
    ttl: 1h
    bind_user_agent: true
    bind_client_ip: true
    bind_client_ip_v4_prefix: 24
    bind_client_ip_v6_prefix: 56
    query_param: "gwgr"
    cookie_name: "__Host-gwgr"
    signing_key: "${GW_V1_GRANT_SIGNING_KEY}"

alerts:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    api_base_url: "https://api.telegram.org"
    timeout: 5s
    parse_mode: ""
    mask_query: true
    include_user_agent: true
    lifecycle:
      startup_notify: true
      shutdown_notify: true
      unclean_exit_notify: true
      self_check_on_start: true
      heartbeat_enabled: false
      heartbeat_interval: 30m
      notify_mode: "notify"
  delivery:
    worker_enabled: false
    poll_interval: 2s
    batch_size: 50
    claim_lease: 30s
    max_attempts: 8
    base_backoff: 5s
    max_backoff: 5m
    rate_limit_per_second: 5
  dedupe:
    window: 10m

reports:
  enabled: false
  timezone_mode: "config"
  timezone: "UTC"
  daily_send_time: "09:00"
  period_mode: "lookback"
  lookback: 24h
  top_n: 10
  include_csv: true
  include_html: true
  worker_enabled: true
  poll_interval: 1m
  replay_batch_size: 1000
  output:
    telegram_enabled: false
    file_enabled: false
    output_dir: "/data/shared/reports"
  filename:
    prefix: "gw-report"
    append_date: true
    date_format: "2006-01-02"

storage:
  local_path: "/data/shared/gw-ipinfo-nginx.db"
  replay_interval: 30s
  mongo_probe_interval: 10s
  replay_batch_size: 500
  replay_workers: 2

performance:
  request_queue_size: 4096
  async_write_queue_size: 16384
  stats_queue_size: 32768
  decision_workers: 4
  alert_workers: 2
  log_sample_rate: 1
  proxy_max_idle_conns: 2048
  proxy_max_idle_conns_per_host: 1024
  proxy_idle_conn_timeout: 90s
  proxy_response_header_timeout: 5s
  proxy_expect_continue_timeout: 1s

deny_page:
  title: "Access Unavailable"
  heading: "Request Blocked"
  message: "Your request did not pass the gateway security checks."
  hint: "If you believe this is a mistake, contact support and provide the request ID."

logging:
  level: "info"
  format: "json"
  redact_query: true
  access_log: true

metrics:
  enabled: true
  path: "/metrics"
