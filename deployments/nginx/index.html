<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gw-ipinfo-nginx upstream</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #edf6f0;
        --panel: #ffffff;
        --ink: #132a1f;
        --muted: #4b6356;
        --accent: #1f7a4d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, #dff5e7 0%, transparent 28%),
          linear-gradient(180deg, #f6fbf8 0%, var(--bg) 100%);
        font: 16px/1.6 "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
      }
      .card {
        width: min(92vw, 760px);
        padding: 40px 34px;
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(19, 42, 31, 0.1);
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #e8f8ee;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(30px, 4vw, 46px);
        line-height: 1.05;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      code {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 10px;
        background: #eff8f2;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Gateway Passed</div>
      <h1>Traffic reached nginx successfully</h1>
      <p>The gateway finished its checks and proxied this request to the configured nginx upstream.</p>
      <p>This page is the default upstream response used for local validation.</p>
      <code>X-Gateway-Service should be present on proxied requests.</code>
    </main>
  </body>
</html>
