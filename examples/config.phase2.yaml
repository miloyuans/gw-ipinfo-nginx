server:
  listen_address: ":8080"

real_ip:
  trusted_proxy_cidrs:
    - "173.245.48.0/20"
  header_priority:
    - "CF-Connecting-IP"
    - "True-Client-IP"
    - "X-Real-IP"
    - "X-Forwarded-For"
  untrusted_proxy_action: "deny"

ipinfo:
  enabled: true
  base_url: "https://api.ipinfo.io"
  lookup_path_template: "/lookup/%s"
  token: "${IPINFO_TOKEN}"
  timeout: 2s
  max_retries: 2
  retry_backoff: 250ms
  include_residential_proxy: true

mongo:
  uri: "${MONGO_URI}"
  database: "gw_ipinfo_nginx"
  connect_timeout: 5s
  operation_timeout: 3s

cache:
  l1:
    enabled: true
    max_entries: 10000
    cleanup_interval_sec: 300
  ttl:
    geo: 24h
    privacy: 6h
    residential_proxy: 6h
  failure_ttl: 5m
  mongo_collections:
    ip_cache: "ip_risk_cache"
    alert_outbox: "alerts_outbox"
    alert_dedupe: "alerts_dedupe"

security:
  ua:
    enabled: true
    deny_keywords:
      - "bot"
      - "crawler"
      - "spider"
      - "facebookexternalhit"
      - "facebot"
  accept_language:
    require_header: true
  geo:
    default_action: "deny"
    whitelist:
      US: {}
      JP:
        cities:
          - "Tokyo"
          - "Osaka"
  privacy:
    deny_by_default: true
    allow_types: []
    enable_residential_proxy: true

routing:
  default_service: "default"
  services:
    - name: "default"
      match_path_prefixes: ["/"]
      target_url: "http://127.0.0.1:8081"
      preserve_host: true

alerts:
  telegram:
    enabled: false
  delivery:
    worker_enabled: false
  dedupe:
    window: 10m

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
